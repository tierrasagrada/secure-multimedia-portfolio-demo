<body class="auth-loading">
    <!-- Formulario de pregunta de seguridad -->
  <div class="contenedor active" id="security-container">
    <h1>Portfolio Access v1.2</h1>

    <p class="security-description">
        This portfolio contains protected content.
        Please enter the access word to continue.
    </p>
<input
    type="password"
    id="answer"
    placeholder="Enter access word"
>

<button id="submit">
    Access Portfolio
</button>

<p class="access-help">
    Need access? Contact the developer.
</p>

<p id="error" class="error"></p>
  </div>

  <div class="protected-content" id="protected-content"> </div>
      <!--<div
        id="sliker"
        style="display:none;">
      </div>    -->
  <div class="security-footer" id="security-footer">
        Protected multimedia portfolio · Access control demonstration
  </div>
  <div id="session-modal" class="session-modal">

    <div class="session-modal-content">

      <h2>Session Warning</h2>

      <p>
          Your session will expire due to inactivity.
      </p>

      <p>
        Time remaining:
        <span id="session-countdown">60</span>
        seconds
      </p>

      <button id="continue-session">
        Continue Session
      </button>

    </div>
  </div>        
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/2.4.0/purify.min.js"></script>

</body>
