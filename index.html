<style>
    .responsive-container {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      width: 100%;
      height: 100%;
    }
    .responsive-container h1 {
      font-size: 3rem;
      text-align: center;
      margin: 20px 0;
    }

    .responsive-container p {
      font-size: 2.0rem;
      text-align: center;
      margin: 10px 0;
      color: #FFFFFF;
    }

    .responsive-container .topright {
      position: absolute;
      top: 20px;
      right: 20px;
    }

    .responsive-container img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      /*box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);*/
       /* Elimina la sombra */
      box-shadow: none;
    }

    /* Estilos responsivos */
    @media (max-width: 768px) {
      .responsive-container h1 {
        font-size: 3.0rem;
      }

      .responsive-container p {
        font-size: 2.0rem;
        color: #FFFFFF;
      }

      /* Mover la imagen debajo de <p> en pantallas pequeñas */
      .responsive-container .topright {
        position: static;
        margin-top: 20px; /* Espaciado entre el párrafo y la imagen */
        align-self: center;
      }

      /* Mantener la resolución de la imagen y centrarla */
      .responsive-container .topright img {
        width: auto; /* Mantiene el tamaño original de la imagen */
        height: auto;
        max-width: 50%; /* Limita el ancho máximo para adaptarse a la pantalla */
        display: block; /* Asegura que la imagen sea tratada como bloque */
        margin: 0 auto; /* Centra la imagen */
      }
      .section-container {
    padding: 30px 0 20px; /* Ajuste del padding */
    min-height: auto; /* Esto asegura que la altura sea adecuada */
  }      
    }

    @media (max-width: 480px) {
      .responsive-container h1 {
        font-size: 3.0rem;
      }

      .responsive-container p {
        font-size: 2.0rem;
        color: #FFFFFF;
      }

      /* Mover la imagen debajo de <p> en pantallas aún más pequeñas */
      .responsive-container .topright {
        position: static;
        margin-top: 20px;
        align-self: center;
      }

      /* Ajustar el tamaño de la imagen en pantallas más pequeñas */
      .responsive-container .topright img {
        width: auto; /* Mantiene el tamaño original */
        height: auto;
        max-width: 70%; /* Limita el tamaño de la imagen aún más */
        display: block;
        margin: 0 auto; /* Centra la imagen */
      }
    /* Ajustes para pantallas pequeñas */
    @media (max-width: 768px) {
      .section-container {
        padding: 30px 0 20px; /* Reduce el padding solo en pantallas pequeñas */
      }
    }      
    }

 <script>
const submitButton = document.getElementById("submit");
submitButton.addEventListener("click", async () => {
  const userAnswer = document.getElementById("answer").value;

  try {
    // Llamada al backend para validar la respuesta y obtener todo el contenido necesario
    const response = await fetch(
      `https://inchallah.vercel.app/api/validarRespuesta?respuesta=${encodeURIComponent(userAnswer)}`
    );

    if (!response.ok) throw new Error("Error al obtener los datos del backend");

    const data = await response.json();

    // Si la respuesta es correcta
    if (data.success) {
      const protectedContent = document.getElementById("protected-content");
      protectedContent.innerHTML = data.content; // Carga el contenido desde la API   
      // 1. Mostrar el contenido HTML oculto
      const protectedContent2 = document.getElementById("sliker");
      protectedContent2.innerHTML = `
        <div id="ninja-slider">
          <div class="slider-inner">
            <ul id="unDiv"></ul>
            <div class="fs-icon" title="Expand/Close"></div>
          </div>
        </div>
      `;

      // 2. Construir el slider dinámicamente en el frontend con las imágenes recibidas
      const sliderContainer = document.getElementById("unDiv");      

      if (sliderContainer && Array.isArray(data.images) && data.images.length > 0) {
        sliderContainer.innerHTML = data.images
          .map(
            (imgSrc) =>
              `<li>
                <a class="ns-img" href="${imgSrc.base64}"></a>
                <div class="caption">@colerise</div>
              </li>`
          )
          .join("");
//        protectedContent.innerHTML = data.content; // Carga el contenido desde la API   
        //const losSlikers = document.getElementById("sliker");
        // Mostrar el slider
        //losSlikers.appendChild= sliderContainer;
        nslider.init ();
        //const sliderWrapper = document.getElementById("ninja-slider");
        //sliderWrapper.style.display = "block";
        protectedContent.style.display = "block";
        document.getElementById("security-container").style.display = "none"; 
        console.log("Slider cargado correctamente.");
      } else {
        console.error("No se encontraron imágenes para cargar.");
      }
    } else {
      alert("Respuesta incorrecta. Por favor, inténtalo de nuevo.");
    }
  } catch (error) {
    console.error("Error:", error);
    alert("Ocurrió un error. Inténtalo nuevamente más tarde.");
  }
});
