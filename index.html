<style>
    .responsive-container {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      width: 100%;
      height: 100%;
    }
    .responsive-container h1 {
      font-size: 3rem;
      text-align: center;
      margin: 20px 0;
    }

    .responsive-container p {
      font-size: 2.0rem;
      text-align: center;
      margin: 10px 0;
      color: #FFFFFF;
    }

    .responsive-container .topright {
      position: absolute;
      top: 20px;
      right: 20px;
    }

    .responsive-container img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      /*box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);*/
       /* Elimina la sombra */
      box-shadow: none;
    }

    /* Estilos responsivos */
    @media (max-width: 768px) {
      .responsive-container h1 {
        font-size: 3.0rem;
      }

      .responsive-container p {
        font-size: 2.0rem;
        color: #FFFFFF;
      }

      /* Mover la imagen debajo de <p> en pantallas pequeñas */
      .responsive-container .topright {
        position: static;
        margin-top: 20px; /* Espaciado entre el párrafo y la imagen */
        align-self: center;
      }

      /* Mantener la resolución de la imagen y centrarla */
      .responsive-container .topright img {
        width: auto; /* Mantiene el tamaño original de la imagen */
        height: auto;
        max-width: 50%; /* Limita el ancho máximo para adaptarse a la pantalla */
        display: block; /* Asegura que la imagen sea tratada como bloque */
        margin: 0 auto; /* Centra la imagen */
      }
      .section-container {
    padding: 30px 0 20px; /* Ajuste del padding */
    min-height: auto; /* Esto asegura que la altura sea adecuada */
  }      
    }

    @media (max-width: 480px) {
      .responsive-container h1 {
        font-size: 3.0rem;
      }

      .responsive-container p {
        font-size: 2.0rem;
        color: #FFFFFF;
      }

      /* Mover la imagen debajo de <p> en pantallas aún más pequeñas */
      .responsive-container .topright {
        position: static;
        margin-top: 20px;
        align-self: center;
      }

      /* Ajustar el tamaño de la imagen en pantallas más pequeñas */
      .responsive-container .topright img {
        width: auto; /* Mantiene el tamaño original */
        height: auto;
        max-width: 70%; /* Limita el tamaño de la imagen aún más */
        display: block;
        margin: 0 auto; /* Centra la imagen */
      }
    /* Ajustes para pantallas pequeñas */
    @media (max-width: 768px) {
      .section-container {
        padding: 30px 0 20px; /* Reduce el padding solo en pantallas pequeñas */
      }
    }

 <script>
  //llamada backend
  document.getElementById("submit").addEventListener("click", async () => {
      const userAnswer = document.getElementById("answer").value.toLowerCase().trim();
      const errorElement = document.getElementById("error");
      const protectedContent = document.getElementById("protected-content");
    const protectedContentImages = document.getElementById("unDiv");
      // Llamada a la función serverless en Vercel para validar la respuesta
      const response = await fetch(`https://inchallah.vercel.app/api/validarRespuesta?respuesta=${userAnswer}`);
      const result = await response.json();
      if (response.ok) {
        // Si la respuesta es correcta, mostramos el contenido protegido
        protectedContent.innerHTML = result.content; // Carga el contenido desde la API
        protectedContentImages.innerHTML = result.images;
        document.getElementById("security-container").style.display = "none";
        protectedContent.style.display = "block";
      } else {
        // Si la respuesta es incorrecta, mostramos un mensaje de error
        errorElement.textContent = result.message;
      }
    });
  
  document.addEventListener("DOMContentLoaded", function() {
    // Code to be executed when the DOM is ready
    nslider.init ();
  }); 
  document.addEventListener("DOMContentLoaded", function () {
    const images = document.querySelectorAll("img");
    images.forEach((img) => {
      img.onload = function () {
        img.style.opacity = "1"; // Muestra la imagen cuando esté lista
      };
    });
  });

// Asegura que las secciones se rendericen correctamente sin mostrar el desplazamiento
document.addEventListener("DOMContentLoaded", function () {
  const sections = document.querySelectorAll(".section-container");

  // Guarda la posición inicial del scroll
  const originalScrollPosition = window.pageYOffset || document.documentElement.scrollTop;

  // Deshabilita el scroll temporalmente
  document.body.style.overflow = "hidden";

  // Desplaza cada sección al viewport sin que sea visible para el usuario
  sections.forEach((section) => {
    section.scrollIntoView({ block: "start" });
  });

  // Restaura la posición inicial y habilita el scroll
  setTimeout(() => {
    window.scrollTo(0, originalScrollPosition);
    document.body.style.overflow = ""; // Reactiva el scroll
  }, 50); // Ajusta el tiempo según sea necesario
});

</script>
